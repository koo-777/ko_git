<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio XYZ - Web Tools Collection</title>
    <meta name="description" content="便利なWebツールを集めたポータルサイト。文字数カウント、ガラポン抽選器など。">
    <style>
        :root {
            --primary-color: #3b82f6;
            --text-color: #1f2937;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        .subtitle {
            color: #6b7280;
            font-size: 1.125rem;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .tool-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        .tool-desc {
            color: #4b5563;
            font-size: 0.95rem;
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            color: #9ca3af;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Studio XYZ</h1>
            <p class="subtitle">シンプルで使いやすいWebツール集</p>
        </header>

        <main class="tools-grid">
            <a href="/char-count/" class="tool-card">
                <div class="tool-title">文字数カウント</div>
                <div class="tool-desc">リアルタイムで文字数を計測。空白・改行の除外設定も可能。</div>
            </a>
            <a href="/garapon/" class="tool-card">
                <div class="tool-title">WEBガラポン</div>
                <div class="tool-desc">ブラウザで動くシンプルな抽選器。イベントやパーティーに最適。</div>
            </a>
        </main>

        <footer>
            <p>&copy; 2024 Studio XYZ. All rights reserved.</p>
        </footer>
    </div>
</body>
<!-- Common Header Injection -->
<script src="/assets/js/global-nav.js" defer></script>

</html>
