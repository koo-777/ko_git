<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feynman Diagram Sketcher | Apexia Lab</title>
    <link rel="stylesheet" href="style.css">
    <!-- Konva for Canvas Rendering -->
    <script src="https://unpkg.com/konva@9.3.3/konva.min.js"></script>
    <!-- MathJax for Labels -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <!-- Top Header -->
    <header class="app-header">
        <div class="header-title">Feynman Diagram Sketcher</div>
        <nav>
            <a href="/" class="header-link">
                <span>← Apexia Lab</span>
            </a>
        </nav>
    </header>

    <div class="app-container">
        <!-- Toolbar -->
        <aside class="toolbar">
            <div class="tool-group">
                <h3>Tools</h3>
                <button class="tool-btn active" data-tool="select" title="Select / Move">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor" d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2.9-3.2-7.4-4.4 4V2z" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="vertex" title="Add Vertex">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="6" fill="currentColor" />
                    </svg>
                </button>
            </div>

            <div class="tool-group">
                <h3>Propagators</h3>
                <button class="tool-btn" data-tool="fermion" title="Fermion (Electron/Quark)">
                    <svg viewBox="0 0 24 24">
                        <path fill="none" stroke="currentColor" stroke-width="2" d="M3 12h18M15 8l4 4-4 4" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="photon" title="Photon / Boson (Wavy)">
                    <svg viewBox="0 0 24 24">
                        <path fill="none" stroke="currentColor" stroke-width="2"
                            d="M2 12c1.3 0 1.3-3 2.6-3s1.3 3 2.6 3 1.3-3 2.6-3 1.3 3 2.6 3 1.3-3 2.6-3 1.3 3 2.6 3 1.3-3 2.6-3 1.3 3 2.6 3 1.3-3 2.6-3 1.3 3 2.6 3" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="gluon" title="Gluon (Loopy)">
                    <svg viewBox="0 0 24 24">
                        <path fill="none" stroke="currentColor" stroke-width="2"
                            d="M3 12c0-2 2-2 2 0s2 2 2 0 2-2 2 0 2 2 2 0 2-2 2 0 2 2 2 0 2-2 2 0 2 2 2 0" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="scalar" title="Scalar (Dashed)">
                    <svg viewBox="0 0 24 24">
                        <path fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4" d="M3 12h18" />
                    </svg>
                </button>
            </div>

            <div class="tool-group">
                <h3>Actions</h3>
                <button class="tool-btn" id="btn-label" title="Add Label">
                    Label
                </button>
                <button class="tool-btn danger" id="btn-delete" title="Delete Selected">
                    🗑️
                </button>
                <button class="tool-btn warning" id="btn-clear" title="Clear Canvas">
                    Clear
                </button>
            </div>

            <div class="tool-group" style="padding: 10px; font-size: 0.9em;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="toggle-vertices" checked>
                    <span>Show Vertices</span>
                </label>
            </div>

            <div class="export-section">
                <a href="manual.html" class="tool-btn" title="Help / Manual" style="text-decoration: none;">
                    ?
                </a>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main class="canvas-area">
            <div id="konva-container"></div>
            <div id="labels-layer"></div> <!-- HTML overlay for MathJax labels -->
        </main>

        <!-- Properties Panel -->
        <aside class="properties-panel">
            <h2>Properties</h2>
            <div id="selection-info">
                <p class="placeholder-text">Select an object to edit properties.</p>
            </div>

            <div class="export-section">
                <h3>Export</h3>
                <button class="action-btn" id="btn-export-png">Download PNG</button>
                <div style="display: flex; gap: 5px;">
                    <button class="action-btn secondary" id="btn-export-svg" style="flex:1;">SVG</button>
                    <button class="action-btn secondary" id="btn-export-pdf" style="flex:1;">PDF</button>
                </div>
                <button class="action-btn secondary" id="btn-export-tikz" style="margin-top: 5px;">Generate
                    TikZ</button>
            </div>
        </aside>
    </div>

    <!-- jsPDF for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Label Selection Modal -->
    <div id="label-select-modal" class="modal hidden">
        <div class="modal-content label-modal">
            <span class="close-modal" id="close-label-modal">&times;</span>
            <h2 class="modal-title">Select Label</h2>

            <div class="particle-section">
                <h3>Leptons</h3>
                <div class="particle-grid">
                    <button class="particle-btn" data-tex="e^-">$e^-$</button>
                    <button class="particle-btn" data-tex="e^+">$e^+$</button>
                    <button class="particle-btn" data-tex="\mu^-">$\mu^-$</button>
                    <button class="particle-btn" data-tex="\mu^+">$\mu^+$</button>
                    <button class="particle-btn" data-tex="\tau^-">$\tau^-$</button>
                    <button class="particle-btn" data-tex="\tau^+">$\tau^+$</button>
                    <button class="particle-btn" data-tex="\nu">$\nu$</button>
                    <button class="particle-btn" data-tex="\bar{\nu}">$\bar{\nu}$</button>
                </div>
            </div>

            <div class="particle-section">
                <h3>Quarks</h3>
                <div class="particle-grid">
                    <button class="particle-btn" data-tex="u">$u$</button>
                    <button class="particle-btn" data-tex="d">$d$</button>
                    <button class="particle-btn" data-tex="c">$c$</button>
                    <button class="particle-btn" data-tex="s">$s$</button>
                    <button class="particle-btn" data-tex="t">$t$</button>
                    <button class="particle-btn" data-tex="b">$b$</button>
                    <button class="particle-btn" data-tex="\bar{u}">$\bar{u}$</button>
                    <button class="particle-btn" data-tex="\bar{d}">$\bar{d}$</button>
                </div>
            </div>

            <div class="particle-section">
                <h3>Bosons</h3>
                <div class="particle-grid">
                    <button class="particle-btn" data-tex="\gamma">$\gamma$</button>
                    <button class="particle-btn" data-tex="g">$g$</button>
                    <button class="particle-btn" data-tex="W^+">$W^+$</button>
                    <button class="particle-btn" data-tex="W^-">$W^-$</button>
                    <button class="particle-btn" data-tex="Z">$Z$</button>
                    <button class="particle-btn" data-tex="H">$H$</button>
                </div>
            </div>

            <div class="custom-input-section">
                <h3>Custom LaTeX</h3>
                <div class="input-row">
                    <input type="text" id="custom-label-input" placeholder="\pi^0" class="prop-input">
                    <button id="btn-add-custom" class="action-btn">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TikZ Export Modal -->
    <div id="tikz-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>TikZ-Feynman Code</h2>
            <p>Copy this code into your LaTeX document. Requires <code>\usepackage{tikz-feynman}</code>.</p>
            <textarea id="tikz-output" readonly></textarea>
            <button class="action-btn" id="btn-copy-tikz">Copy to Clipboard</button>
        </div>
    </div>

    <script src="propagators.js"></script>
    <script src="tikz-exporter.js"></script>
    <script src="script.js"></script>
</body>

</html>
