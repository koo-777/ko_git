<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Work Timer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <div class="tabs-header">
            <div id="tabs-container" class="tabs-list">
                <!-- Tabs will be injected here -->
            </div>
            <button id="add-task-btn" class="btn-icon" title="Add Task">+</button>
        </div>

        <div id="task-content" class="task-content">
            <div class="input-group">
                <input type="text" id="task-name-input" placeholder="Task Name">
            </div>

            <div id="timer-display">00:00:00</div>

            <div class="controls">
                <button id="start-stop-btn" class="btn primary">Start</button>
                <button id="reset-btn" class="btn secondary">Reset</button>
            </div>

            <div class="footer-controls">
                <div id="status-msg">Ready</div>
                <div>
                    <button id="copy-log-btn" class="btn-text">Copy Log</button>
                    <button id="delete-task-btn" class="btn-text danger">Delete Task</button>
                </div>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
