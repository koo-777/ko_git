    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Image to PDF | Apexia Lab</title>
    <meta name="description" content="Convert multiple images to a single PDF file securely in your browser.">

    <!-- OGP Tags -->
    <meta property="og:title" content="Simple Image to PDF | Apexia Lab">
    <meta property="og:description" content="Convert multiple images to a single PDF file securely in your browser.">
    <meta property="og:type" content="article">

    <!-- Twitter Card -->

    <meta name="twitter:title" content="Simple Image to PDF | Apexia Lab">

    <link rel="stylesheet" href="style.css">
    <!-- Load jsPDF from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Load SortableJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>

<body>
    <h1>Simple Image to PDF</h1>

    <div class="main-container">
        <div id="drop-zone" class="drop-zone">
            <p>ここに画像をドラッグ＆ドロップ<br>またはクリックして選択</p>
            <input type="file" id="file-input" accept="image/jpeg, image/png" multiple style="display: none;">
        </div>

        <div id="preview-area" class="preview-area">
            <!-- Thumbnails will be injected here -->
        </div>

        <div class="controls">
            <div class="quality-selector">
                <label for="quality-select">画質:</label>
                <select id="quality-select">
                    <option value="0.95">高画質 (低圧縮)</option>
                    <option value="0.8" selected>標準 (バランス)</option>
                    <option value="0.6">低画質 (高圧縮)</option>
                </select>
            </div>
            <button id="generate-btn" class="btn primary" disabled>PDFを作成・ダウンロード</button>
            <button id="reverse-btn" class="btn secondary" style="display: none;">逆順にする</button>
            <button id="clear-btn" class="btn secondary" style="display: none;">全消去</button>
        </div>

        <div id="status-message"></div>
    </div>

    <footer>

</body>

</html>
