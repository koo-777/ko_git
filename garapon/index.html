<body>

    <h1>手動補充ガラガラポン</h1>

    <div class="main-layout">
        <div class="machine-area">
            <div class="machine-container">
                <div id="machine" class="machine-body"></div>
                <div class="exit"></div>
                <div id="ball" class="ball"></div>
            </div>
            <div id="result-text">準備OK！</div>
            <button id="draw-btn" class="btn btn-draw" onclick="startLottery()">まわす！</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                <h3 style="margin:0;">設定と補充</h3>
                <div>
                    <button class="btn btn-add" onclick="addRow()">＋賞追加</button>
                    <button class="btn btn-refill" onclick="refillAll()">🔄 玉を補充</button>
                </div>
            </div>
            <table id="settings-table">
                <thead>
                    <tr>
                        <th>色</th>
                        <th>賞の名前</th>
                        <th>初期数</th>
                        <th>現在の在庫</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="settings-body">
                    <tr>
                        <td><input type="color" value="#ffd700"></td>
                        <td><input type="text" value="1等"></td>
                        <td><input type="number" class="init-count" value="1" min="0"></td>
                        <td><input type="number" class="current-stock" value="1" readonly></td>
                        <td><button class="btn btn-delete" onclick="this.closest('tr').remove()">削除</button></td>
                    </tr>
                </tbody>
            </table>
            <p style="font-size:11px; color:#666;">※初期数：補充ボタンを押した時にこの数に戻ります。</p>
        </div>

        <div class="card" style="width:300px;">
            <h3>抽選履歴</h3>
            <ul id="history-list" class="history-list">
                <li class="placeholder">履歴はまだありません</li>
            </ul>
            <button class="btn" style="font-size:11px; margin-top:10px; background:#eee;"
                onclick="clearHistory()">履歴リセット</button>
            <div style="margin-top: 20px; text-align: center; font-size: 11px;">
                <a href="/privacy/" style="color: #666; margin: 0 5px; text-decoration: none;">Privacy Policy</a>
                <a href="mailto:contact@apexia-labs.com"
                    style="color: #666; margin: 0 5px; text-decoration: none;">Contact (Email)</a>
            </div>
        </div>
    </div>

    <script src="/assets/js/global-nav.js"></script>
    <script src="script.js"></script>
</body>
